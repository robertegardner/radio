<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>{{ site_title }}</title>
<style>
  :root {
    --bg-deep:   #0a0a0c;
    --bg-panel:  #15161a;
    --bg-raise:  #1f2126;
    --bg-button: #2a2d33;
    --bg-button-hover: #353941;
    --line:      #2c2e34;
    --amber:     #ffae3a;
    --amber-dim: #6b4818;
    --green:     #6df09b;
    --red:       #f06d6d;
    --text:      #e6e6e6;
    --text-dim:  #888;
    --text-faint:#555;
    --accent:    #2563eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: radial-gradient(circle at 50% -20%, #1a1c22 0%, var(--bg-deep) 70%);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 1rem;
    user-select: none;
  }

  /* Butterchurn visualizer: full-viewport canvas BEHIND the tuner UI. The
     body's own background must go transparent while it's on — body paints
     over its negative-z children (html's propagated gradient does not). */
  #viz-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: -1;
    display: none;
    background: #000;
  }
  body.viz-on { background: transparent; }

  /* Album art in the LCD panel (layout C): a crisp cover tile beside the
     station info, plus a blurred wash of the same cover tinting the panel. */
  .art-wash {
    position: absolute; inset: -12%; z-index: 0; pointer-events: none;
    background-size: cover; background-position: center;
    filter: blur(34px) saturate(1.6) brightness(.7);
    opacity: 0; transition: opacity .8s ease;
  }
  .lcd.has-art .art-wash { opacity: .7; }
  .lcd.has-art::after {                 /* readability scrim over the wash */
    content: ""; position: absolute; inset: 0; z-index: 1; pointer-events: none;
    background: radial-gradient(circle at 30% 35%,
                  rgba(13,14,16,.4) 0%, rgba(13,14,16,.82) 100%);
  }
  .lcd-row, .lcd-main { position: relative; z-index: 2; }   /* content above wash+scrim */
  .lcd-main { display: flex; gap: .9rem; align-items: center; margin-top: .5rem; }
  .lcd-info { flex: 1 1 auto; min-width: 0; }
  .lcd-cover {
    display: none;                      /* only present when art is available */
    flex: none; width: 116px; height: 116px; border-radius: 8px;
    background: #222 center/cover no-repeat;
    box-shadow: 0 4px 14px rgba(0,0,0,.5);
    border: 1px solid rgba(255,255,255,.08);
  }
  .lcd.has-art .lcd-cover { display: block; }
  @media (prefers-reduced-motion: reduce) {
    .art-wash { transition: none; }
  }
  .stereo {
    width: 100%; max-width: 600px;
    background: linear-gradient(180deg, #1a1c22 0%, var(--bg-panel) 100%);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 20px 60px rgba(0,0,0,.5),
                inset 0 1px 0 rgba(255,255,255,.04);
    padding: 1.25rem;
    display: flex; flex-direction: column; gap: 1rem;
  }

  /* LCD */
  .lcd {
    background: linear-gradient(180deg, #0d0e10 0%, #16181c 100%);
    border: 1px solid #000;
    border-radius: 10px;
    padding: 1rem 1.25rem;
    box-shadow: inset 0 2px 8px rgba(0,0,0,.7);
    position: relative;
    overflow: hidden;            /* clip the blurred art wash to the panel */
    min-height: 130px;
  }
  .lcd-row { display: flex; justify-content: space-between; align-items: baseline; }
  .lcd-band {
    color: var(--amber);
    font-family: 'Courier New', monospace;
    font-size: .85rem;
    font-weight: 700;
    letter-spacing: .12em;
    text-shadow: 0 0 8px var(--amber);
  }
  .lcd-band .other { color: var(--amber-dim); margin-left: .4rem; text-shadow: none; }
  .lcd-band .hd-sub {
    color: var(--amber);
    margin-left: .35rem;
    font-size: .75rem;
    text-shadow: 0 0 6px var(--amber);
    display: none;
  }
  .lcd-status {
    display: flex; gap: .65rem; align-items: center;
    font-size: .7rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .1em;
  }
  .led {
    /* inline-block is required — a plain inline <span> ignores width/height,
       which left these dots at 0×0 and invisible. */
    display: inline-block; vertical-align: middle;
    width: 8px; height: 8px; margin-right: 4px; margin-bottom: 1px;
    border-radius: 50%;
    background: #333;
    transition: background .15s, box-shadow .15s;
  }
  .led.on  { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .led.hd  { background: var(--amber); box-shadow: 0 0 8px var(--amber); }
  .led.err { background: var(--red);   box-shadow: 0 0 8px var(--red); }

  .lcd-freq {
    color: var(--amber);
    font-family: 'Courier New', monospace;
    font-weight: 700;
    font-size: 4rem;
    letter-spacing: .04em;
    line-height: 1;
    margin: .5rem 0 .25rem;
    text-shadow: 0 0 12px rgba(255,174,58,.6);
    font-variant-numeric: tabular-nums;
    cursor: pointer;
  }
  .lcd-freq .unit {
    font-size: 1rem; color: var(--amber-dim);
    margin-left: .4rem; letter-spacing: .15em; vertical-align: middle;
  }
  .lcd-call {
    color: var(--text); font-size: 1.05rem; font-weight: 500;
    min-height: 1.4em; cursor: pointer;
  }
  .lcd-call .city { color: var(--text-dim); font-weight: 400; font-size: .85rem; }
  .lcd-call .ovr-badge { color: var(--amber); font-size: .8rem; opacity: .8; }
  .lcd-track {
    display: flex; align-items: center; gap: .5rem;
    margin-top: .25rem; min-height: 1.3em;
  }
  #track-display {
    color: #a8d0f0; font-size: .9rem;
    flex: 1 1 auto; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  #track-display:empty::before { content: "—"; color: var(--text-faint); }
  /* Provenance badge: which pipeline identified the current artist/title. */
  .track-src {
    flex: none;
    font-family: 'Courier New', monospace;
    font-size: .58rem; font-weight: 700; letter-spacing: .08em;
    padding: .1rem .4rem; border-radius: 4px;
    border: 1px solid currentColor; opacity: .9;
  }
  .track-src.src-rds      { color: var(--amber); }
  .track-src.src-lyrics   { color: #7ec8ff; }
  .track-src.src-acoustid { color: #b48cff; }

  /* Presets */
  .presets-label {
    font-size: .65rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: .15em;
    margin-bottom: .4rem; padding-left: .25rem;
  }
  .presets {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: .5rem;
  }
  .preset {
    background: var(--bg-button);
    border: 1px solid transparent;
    border-radius: 8px;
    padding: .55rem .25rem;
    cursor: pointer;
    text-align: center;
    transition: all .12s;
    overflow: hidden;
  }
  .preset:hover:not(:disabled) { background: var(--bg-button-hover); }
  .preset.active { border-color: var(--amber); background: #2c2520; }
  .preset.empty { opacity: .55; }
  .preset .num {
    display: block;
    font-size: .65rem; color: var(--text-dim);
    font-weight: 600;
  }
  .preset .label {
    display: block; margin-top: .15rem;
    font-size: .8rem; font-weight: 600; color: var(--text);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .preset .freq {
    display: block;
    font-size: .65rem; color: var(--text-dim);
    font-family: 'Courier New', monospace;
  }
  .preset.empty .label { color: var(--text-faint); font-weight: 400; font-style: italic; }
  .preset.empty .freq { display: none; }
  .preset .pmeta {
    display: flex; gap: .3rem; justify-content: center; margin-top: .15rem;
    font-size: .55rem; font-family: 'Courier New', monospace; line-height: 1;
  }
  .preset .pmeta .ant    { color: var(--amber-dim); }
  .preset .pmeta .mono   { color: var(--amber); }
  .preset .pmeta .stereo { color: var(--text-faint); }

  /* Controls */
  .controls {
    display: flex; flex-wrap: wrap;
    justify-content: space-between;
    gap: .75rem; align-items: center;
  }
  .ctrl-group { display: flex; flex-wrap: wrap; gap: .4rem; align-items: center; }
  .btn {
    background: var(--bg-button);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: .6rem .85rem;
    font-size: .85rem;
    font-weight: 500;
    cursor: pointer;
    transition: all .12s;
    display: inline-flex; align-items: center; justify-content: center; gap: .35rem;
    min-width: 44px; min-height: 40px;
  }
  .btn:hover:not(:disabled) { background: var(--bg-button-hover); }
  .btn:disabled { opacity: .35; cursor: not-allowed; }
  .btn.primary { background: var(--accent); border-color: var(--accent); }
  .btn.primary:hover { filter: brightness(1.1); }
  .btn.danger  { background: #3a2424; border-color: #5a3434; }
  .btn.toggle.on { background: var(--amber); color: #1a1208; border-color: var(--amber); }

  /* HD subchannel row */
  .hd-subch-row {
    display: flex; flex-direction: column; gap: .35rem;
  }
  .hd-subch-group { display: flex; gap: .4rem; }
  .btn.hd-ch { min-width: 52px; font-size: .8rem; font-family: 'Courier New', monospace; letter-spacing: .04em; }
  .btn.hd-ch.active { background: var(--amber); color: #1a1208; border-color: var(--amber); }
  .btn.qual-ch { min-width: 48px; font-size: .8rem; font-family: 'Courier New', monospace; letter-spacing: .04em; }
  .btn.qual-ch.active { background: var(--amber); color: #1a1208; border-color: var(--amber); }

  /* Volume */
  .vol-wrap { display: flex; align-items: center; gap: .5rem; }
  .vol-label { font-size: 1.1rem; color: var(--text-dim); }
  /* L/R level meters */
  .levels { display: flex; gap: 3px; align-items: flex-end; height: 30px; }
  .lvl-ch {
    position: relative; width: 7px; height: 24px; border-radius: 2px;
    background: var(--bg-raise, #1a1d22); overflow: hidden;
    display: flex; align-items: flex-end;
  }
  .lvl-ch .lvl-fill {
    display: block; width: 100%; height: 0%;
    background: linear-gradient(to top, var(--green, #6df09b) 0%, var(--green, #6df09b) 70%, var(--amber, #ffae3a) 90%, var(--red, #f06d6d) 100%);
    transition: height .05s linear;
  }
  .lvl-ch .lvl-tag {
    position: absolute; bottom: -12px; left: 0; right: 0; text-align: center;
    font-size: .5rem; color: var(--text-faint); line-height: 1;
  }
  .levels.mono #lvl-r { display: none; }
  input[type=range] {
    -webkit-appearance: none; appearance: none;
    width: 120px; height: 6px;
    background: var(--bg-raise); border-radius: 3px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px;
    background: var(--amber); border-radius: 50%; cursor: pointer;
    box-shadow: 0 0 4px rgba(255,174,58,.5);
  }
  input[type=range]::-moz-range-thumb {
    width: 18px; height: 18px;
    background: var(--amber); border-radius: 50%; cursor: pointer; border: 0;
  }

  /* Ticker */
  .ticker {
    margin-top: .25rem;
    padding: .5rem .75rem;
    background: var(--bg-raise);
    border-radius: 6px;
    font-size: .8rem;
    color: var(--text-dim);
    min-height: 1.4em;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    font-style: italic;
  }
  .ticker.lyric { color: #e8b88a; font-style: normal; font-weight: 500; }
  .ticker:empty { display: none; }

  /* Station modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.7);
    backdrop-filter: blur(4px);
    display: none; align-items: center; justify-content: center;
    padding: 1rem; z-index: 100;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: var(--bg-panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 1rem;
    width: 100%; max-width: 480px;
    max-height: 80vh;
    display: flex; flex-direction: column;
  }
  .modal h3 { font-size: 1rem; margin-bottom: .75rem; color: var(--text); }
  .modal-list {
    overflow-y: auto;
    flex: 1;
    border: 1px solid var(--line);
    border-radius: 8px;
  }
  .modal-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: .65rem .85rem;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    transition: background .1s;
  }
  .modal-row:hover { background: var(--bg-raise); }
  .modal-row:last-child { border-bottom: 0; }
  .modal-row .left { display: flex; flex-direction: column; gap: .15rem; }
  .modal-row .freq {
    font-family: 'Courier New', monospace;
    color: var(--amber); font-weight: 600;
  }
  .modal-row .name { color: var(--text); font-size: .85rem; }
  .modal-row .city { color: var(--text-dim); font-size: .75rem; }
  .modal-row .snr  { color: var(--text-dim); font-size: .75rem; font-family: 'Courier New', monospace; }
  .modal-row .antbadge {
    display: inline-block; margin-left: .35rem; padding: .05rem .3rem; border-radius: 4px;
    background: rgba(255,174,58,.15); color: var(--amber); font-size: .7rem; font-weight: 600;
  }
  .modal-row.hd-row {
    padding-left: 1.75rem;
    background: rgba(255,174,58,.03);
    border-left: 2px solid var(--amber-dim);
  }
  .modal-row.hd-row .freq { color: var(--amber); font-size: .85rem; }
  .hd-badge {
    color: var(--amber); font-size: .68rem; font-weight: 700;
    letter-spacing: .12em; padding: .1rem .3rem;
    border: 1px solid var(--amber-dim); border-radius: 4px;
  }
  .modal-actions {
    display: flex; justify-content: space-between; gap: .5rem;
    margin-top: .75rem;
  }
  .modal-empty { padding: 2rem; text-align: center; color: var(--text-dim); }

  /* Direct tune modal */
  .direct-tune-body { display: flex; flex-direction: column; gap: .75rem; margin-bottom: .25rem; }
  .direct-tune-band { display: flex; gap: .5rem; }
  .direct-tune-input {
    background: var(--bg-raise);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--amber);
    font-family: 'Courier New', monospace;
    font-size: 2.5rem;
    font-weight: 700;
    padding: .5rem .75rem;
    outline: none;
    width: 100%;
    text-align: center;
    -moz-appearance: textfield;
    -webkit-appearance: none;
    appearance: none;
    text-shadow: 0 0 8px rgba(255,174,58,.4);
  }
  .direct-tune-input::-webkit-inner-spin-button,
  .direct-tune-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .direct-tune-input:focus { border-color: var(--amber); box-shadow: 0 0 0 2px rgba(255,174,58,.15); }
  .direct-tune-hint { font-size: .75rem; color: var(--text-faint); text-align: center; }

  /* Toast */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--bg-button); color: var(--text);
    padding: .6rem 1rem; border-radius: 6px;
    border: 1px solid var(--line);
    font-size: .85rem;
    opacity: 0; transition: opacity .25s;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; }

  /* Weather-satellite next-pass / capture notice */
  .wxsat-row {
    display: flex; align-items: center; gap: .7rem;
    background: var(--bg-raise); border: 1px solid var(--line);
    border-radius: 10px; padding: .55rem .8rem;
    font-size: .76rem; color: var(--text-dim); line-height: 1.35;
  }
  .wxsat-row.armed      { border-color: var(--amber-dim); }
  .wxsat-row.authorized { border-color: var(--amber); background: rgba(255,174,58,.06); }
  .wxsat-row.capturing  { border-color: var(--amber); color: var(--amber); }
  .wxsat-icon { font-size: 1rem; flex: none; }
  .wxsat-text { flex: 1 1 auto; min-width: 0; }
  .wxsat-text b { color: var(--text); }
  .wxsat-text .cd { color: var(--amber); font-family: 'Courier New', monospace; font-weight: 700; }
  .wxsat-btn {
    flex: none; font-size: .72rem; padding: .4rem .7rem; border-radius: 7px;
    background: var(--bg-button); color: var(--text); border: 1px solid var(--line); cursor: pointer;
  }
  .wxsat-btn:hover { background: var(--bg-button-hover); }
  .wxsat-btn.on { border-color: var(--amber); color: var(--amber); }

  .footer {
    margin-top: .5rem;
    text-align: center;
    font-size: .7rem; color: var(--text-faint);
  }
  .footer a { color: var(--text-dim); text-decoration: none; }
  .footer a:hover { color: var(--text-dim); text-decoration: underline; }

  @media (max-width: 480px) {
    .lcd-freq { font-size: 3rem; }
    .presets { grid-template-columns: repeat(4, 1fr); }
    input[type=range] { width: 80px; }
  }
</style>
</head>
<body>

<!-- MilkDrop-style visualizer (Butterchurn). Sits behind the tuner UI;
     hidden until the VIZ toggle turns it on. -->
<canvas id="viz-canvas"></canvas>

<div class="stereo">
  <!-- LCD display -->
  <div class="lcd" id="lcd">
    <!-- Blurred wash of the current cover, tinting the panel (layout C). -->
    <div class="art-wash" id="art-wash"></div>
    <div class="lcd-row">
      <div class="lcd-band">
        <span id="band-fm">FM</span>
        <span id="band-am" class="other">AM</span>
        <span id="band-hd-sub" class="hd-sub"></span>
      </div>
      <div class="lcd-status">
        <span><span class="led" id="hd-led"></span> <span id="hd-label">HD</span></span>
        <span><span class="led" id="rds-led"></span> RDS</span>
        <span><span class="led" id="stereo-led"></span> <span id="stereo-label">STEREO</span></span>
        <span><span class="led" id="stream-led"></span> STREAM</span>
      </div>
    </div>

    <div class="lcd-main">
      <!-- Crisp album cover tile (shown only when art is available). -->
      <div class="lcd-cover" id="lcd-cover"></div>
      <div class="lcd-info">
        <div class="lcd-freq" id="freq-display" title="Tap to direct tune">---.-<span class="unit" id="unit">MHz</span></div>
        <div class="lcd-call" id="call-display" title="Tap to edit the station name">—</div>
        <div class="lcd-track">
          <span id="track-display"></span>
          <span class="track-src" id="track-src" style="display:none"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Presets -->
  <div>
    <div class="presets-label">Presets — tap to tune, long-press to save current station</div>
    <div class="presets" id="presets"></div>
  </div>

  <!-- Ticker (captions / lyrics) -->
  <div class="ticker" id="ticker"></div>

  <!-- Main controls -->
  <div class="controls">
    <div class="ctrl-group">
      <button class="btn toggle" id="band-toggle" title="Switch band">FM</button>
      <button class="btn toggle" id="hd-toggle" title="Toggle HD Radio" disabled>HD</button>
      <button class="btn" id="seek-down" title="Previous station">«</button>
      <button class="btn" id="seek-up"   title="Next station">»</button>
      <button class="btn" id="direct-tune-btn" title="Direct tune">⌨</button>
      <button class="btn" id="stations-btn" title="Browse stations">≡</button>
      <button class="btn toggle" id="viz-toggle" title="Audio visualizer — tap the background for fullscreen, double-tap for next pattern" style="display:none">VIZ</button>
      <button class="btn toggle" id="duck-toggle" title="Duck on talk — near-mute commercials/DJ talk, prompt restore on music">DUCK</button>
      <button class="btn toggle" id="mono-toggle" title="Mono — drops the noisy 38 kHz stereo subcarrier; much cleaner on weak/talk stations">MONO</button>
      <button class="btn toggle" id="ant-toggle" title="FM/AM antenna A/B/C (A=Shakespeare, B=dipole+LNA, C=long-wire). Tap to cycle. Strong AM locals are best on A.">ANT A</button>
    </div>
    <div class="ctrl-group">
      <button class="btn primary" id="play-btn" title="Play/Pause">▶</button>
      <div class="vol-wrap">
        <span class="vol-label" id="vol-icon">🔊</span>
        <input type="range" id="vol" min="0" max="100" value="80">
        <div class="levels" id="levels" title="L/R audio levels">
          <div class="lvl-ch" id="lvl-l"><span class="lvl-fill"></span><span class="lvl-tag">L</span></div>
          <div class="lvl-ch" id="lvl-r"><span class="lvl-fill"></span><span class="lvl-tag">R</span></div>
        </div>
      </div>
    </div>
  </div>

  <!-- HD subchannel selector (shown only when HD is active) -->
  <div class="hd-subch-row" id="hd-subch-row" style="display:none">
    <div class="presets-label">HD Subchannel</div>
    <div class="hd-subch-group">
      <button class="btn hd-ch" data-sub="0">HD1</button>
      <button class="btn hd-ch" data-sub="1">HD2</button>
      <button class="btn hd-ch" data-sub="2">HD3</button>
      <button class="btn hd-ch" data-sub="3">HD4</button>
    </div>
  </div>

  <!-- Stream quality (bitrate) selector -->
  <div class="hd-subch-row" id="qual-row">
    <div class="presets-label">Stream quality — lower = smoother on weak wifi</div>
    <div class="hd-subch-group">
      <button class="btn qual-ch" data-br="64k">64k</button>
      <button class="btn qual-ch" data-br="96k">96k</button>
      <button class="btn qual-ch" data-br="128k">128k</button>

<div class="toast" id="toast"></div>

<!-- Butterchurn (MilkDrop-style visualizer), vendored — no CDN at runtime.
     If these fail to load the page still works: the VIZ button stays hidden. -->
<script src="/static/butterchurn.min.js"></script>
<script src="/static/butterchurnPresets.min.js"></script>
<script src="/static/isSupported.min.js"></script>

<script>
'use strict';

// Server-rendered stream URL (configurable in admin UI > Settings).
const STREAM_URL = {{ stream_url|tojson }};

const NUM_PRESETS = 12;
const LS_PRESETS  = 'sdr-radio.presets.v2';
const LS_VOL      = 'sdr-radio.vol';
const LS_BAND     = 'sdr-radio.band';
const LS_HD       = 'sdr-radio.hd';
const LS_SUBCH    = 'sdr-radio.subch';
const LS_VIZ_FM   = 'sdr-radio.viz.fm';
const LS_VIZ_AM   = 'sdr-radio.viz.am';
const LS_DUCK_FM  = 'sdr-radio.duck.fm';
const LS_DUCK_AM  = 'sdr-radio.duck.am';

const $ = id => document.getElementById(id);
const audio = $('audio');

let stations   = { fm: [], am: [] };
let currentBand      = localStorage.getItem(LS_BAND) || 'fm';
let currentFreq      = null;
let currentHd        = localStorage.getItem(LS_HD) === '1';
let currentSubchannel = parseInt(localStorage.getItem(LS_SUBCH) || '0', 10) || 0;
let presets    = loadPresets();
let isPlaying  = false;
let modalBand  = 'fm';
let currentBitrate = '128k';   // reflects server state; set from /api/status
let currentStereo  = true;     // selected MODE (mono toggle/presets); from /api/now_playing
let currentPilot   = false;    // TRUE 19 kHz pilot lock; drives the STEREO LED + L/R meter
let currentAntenna = 'Antenna A';
let currentArtUrl  = '';       // album-art currently shown (proxy URL key)
let currentStationLabel = '';  // station name currently shown (for the ID editor)
let directTuneBand = currentBand;

// ---------------------------------------------------------------------------
// Presets
// ---------------------------------------------------------------------------
function loadPresets() {
  try {
    const raw = JSON.parse(localStorage.getItem(LS_PRESETS) || '[]');
    if (Array.isArray(raw)) {
      const out = raw.slice(0, NUM_PRESETS);
      while (out.length < NUM_PRESETS) out.push(null);
      return out;
    }
  } catch (e) {}
  return new Array(NUM_PRESETS).fill(null);
}
function savePresets() { localStorage.setItem(LS_PRESETS, JSON.stringify(presets)); }

function renderPresets() {
  const grid = $('presets');
  grid.innerHTML = '';
  presets.forEach((p, i) => {
    const isActive = p && currentFreq
      && p.band === currentBand
      && p.freq === currentFreq
      && !!p.hd === currentHd
      && (!currentHd || (p.subchannel || 0) === currentSubchannel);

    const btn = document.createElement('button');
    btn.className = 'preset' + (p ? '' : ' empty') + (isActive ? ' active' : '');
    // Per-preset FM settings badge: antenna (A/B/C) + stereo/mono.
    let meta = '';
    if (p && p.band === 'fm' && p.antenna) {
      const ant  = p.antenna.slice(-1);            // A | B | C
      const mono = p.stereo === false;
      meta = `<span class="pmeta">`
           + `<span class="ant">ANT ${ant}</span>`
           + `<span class="${mono ? 'mono' : 'stereo'}">${mono ? '◗ MONO' : '◖◗ ST'}</span>`
           + `</span>`;
    }
    btn.innerHTML = `
      <span class="num">${i + 1}</span>
      <span class="label">${p ? (p.label || formatFreq(p.freq, p.band, !!p.hd, p.subchannel || 0)) : 'empty'}</span>
      <span class="freq">${p ? formatFreq(p.freq, p.band, !!p.hd, p.subchannel || 0) : ''}</span>
      ${meta}
    `;
    btn.addEventListener('click', () => {
      if (btn.dataset.suppressClick) { delete btn.dataset.suppressClick; return; }
      if (p) tuneTo(p.freq, p.band, !!p.hd, p.subchannel || 0,
                    (typeof p.stereo === 'boolean' ? p.stereo : null), p.antenna || null);
      else   editOrSavePreset(i);
    });
    btn.addEventListener('contextmenu', e => { e.preventDefault(); editOrSavePreset(i); });
    let lpTimer;
    const startLP = () => {
      lpTimer = setTimeout(() => { editOrSavePreset(i); btn.dataset.suppressClick = '1'; }, 700);
    };
    const cancelLP = () => clearTimeout(lpTimer);
    btn.addEventListener('touchstart', startLP, {passive: true});
    btn.addEventListener('touchend',   cancelLP);
    btn.addEventListener('touchmove',  cancelLP);
    btn.addEventListener('mousedown',  startLP);
    btn.addEventListener('mouseup',    cancelLP);
    btn.addEventListener('mouseleave', cancelLP);
    grid.appendChild(btn);
  });
}

function savePresetSlot(slot) {
  if (!currentFreq) { showToast('Tune to a station first'); return; }
  const list = stations[currentBand] || [];
  const found = list.find(s => stationFreqStr(s, currentBand) === currentFreq);
  // Prefer the name currently shown (override > RDS > FCC), then the scan list,
  // then bare freq. So a station you've renamed lands in the preset already named.
  let label = currentStationLabel
    || (found && (found.call || found.ps))
    || (currentBand.toUpperCase() + ' ' + formatFreq(currentFreq, currentBand));
  if (currentHd) label += ' HD' + (currentSubchannel + 1);
  presets[slot] = { freq: currentFreq, band: currentBand, hd: currentHd, subchannel: currentSubchannel,
                    stereo: currentStereo, antenna: currentAntenna, label };
  savePresets();
  renderPresets();
  const ant = currentBand === 'fm' ? ` · ${currentAntenna.slice(-1)}${currentStereo ? '' : '·mono'}`
            : currentBand === 'am' ? ` · ${currentAntenna.slice(-1)}` : '';
  showToast(`Saved to preset ${slot + 1}: ${label}${ant}`);
}

// Long-press / right-click a preset: rename it (filled) or save the current
// station (empty). Blank rename = re-save the current station into the slot.
function editOrSavePreset(slot) {
  const p = presets[slot];
  if (!p) { savePresetSlot(slot); return; }
  const name = prompt(`Preset ${slot + 1} title (blank = re-save the current station here):`, p.label || '');
  if (name === null) return;
  if (name.trim()) {
    p.label = name.trim(); savePresets(); renderPresets();
    showToast(`Renamed preset ${slot + 1}: ${p.label}`);
  } else {
    savePresetSlot(slot);
  }
}

// ---------------------------------------------------------------------------
// Frequency / band helpers
// ---------------------------------------------------------------------------
function stationFreqStr(s, band) {
  return band === 'fm'
    ? Number(s.freq_mhz).toString()
    : Number(s.freq_khz).toString();
}

function formatFreq(freq, band, hd, subchannel) {
  if (!freq) return '';
  if (hd) return `${Number(freq).toFixed(1)} HD${(subchannel ?? 0) + 1}`;
  return band === 'am' ? `${freq} kHz` : `${Number(freq).toFixed(1)} MHz`;
}

// ---------------------------------------------------------------------------
// Tune
// ---------------------------------------------------------------------------
async function tuneTo(freq, band, hd = false, subchannel = 0, stereo = null, antenna = null) {
  const dispLabel = hd
    ? `${band.toUpperCase()} ${Number(freq).toFixed(1)} HD${subchannel + 1}`
    : `${band.toUpperCase()} ${formatFreq(freq, band)}`;
  showToast(`Tuning ${dispLabel}…`);
  const wasPlaying = isPlaying;
  if (isPlaying) pauseStream();
  // Show amber immediately so there's always visual feedback during a tune.
  $('stream-led').classList.add('hd');
  try {
    // Carry per-preset stereo/antenna so recall is one restart. Omitted (null) =
    // leave the current setting (manual tunes / old presets without these fields).
    const body = {freq, band, hd, subchannel};
    if (stereo !== null) body.stereo = stereo;
    if (antenna) body.antenna = antenna;
    const r = await fetch('/api/tune', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body),
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'tune failed');
    const bandChanged  = band !== currentBand;
    currentFreq       = String(freq);
    currentBand       = band;
    currentHd         = hd;
    currentSubchannel = subchannel;
    localStorage.setItem(LS_BAND,  band);
    localStorage.setItem(LS_HD,    hd ? '1' : '0');
    localStorage.setItem(LS_SUBCH, String(subchannel));
    // Cosmetic UI updates must never block the audio resume below.
    try { updateBandUI(); updateHdUI(); renderPresets();
          if (bandChanged) { applyVizBandPref(); applyDuckBandPref(); } } catch (e) {}
  } catch (e) {
    showToast('Tune failed: ' + e.message);
  } finally {
    $('stream-led').classList.remove('hd');
    // ALWAYS resume if we were playing — the source restart drops the mount for a
    // few seconds; waitForStream rides out the remote reconnect and playStream's
    // scheduleReconnect covers the rest. (Previously a throw before playStream left
    // isPlaying=false → the stream stayed dead and you had to hit play.)
    if (wasPlaying) { isPlaying = true; await waitForStream(); playStream(); }
  }
}

// Poll /api/status until the stream service reports active, then wait for
// Icecast to buffer enough audio for playback to succeed immediately.
async function waitForStream(maxWaitMs = 20000, pollMs = 500) {
  const deadline = Date.now() + maxWaitMs;
  while (Date.now() < deadline) {
    await new Promise(r => setTimeout(r, pollMs));
    try {
      const d = await (await fetch('/api/status')).json();
      if (d.status === 'active') {
        // Service is active, but wbfm still has to reconnect to the REMOTE dx-R2
        // and publish before the mount serves audio (~5-8 s). Wait that out; any
        // residual gap is covered by playStream's scheduleReconnect.
        await new Promise(r => setTimeout(r, 6000));
        return;
      }
    } catch (e) {}
  }
}

// ---------------------------------------------------------------------------
// Band UI
// ---------------------------------------------------------------------------
function updateBandUI() {
  $('band-fm').style.color       = currentBand === 'fm' ? 'var(--amber)' : 'var(--amber-dim)';
  $('band-fm').style.textShadow  = currentBand === 'fm' ? '0 0 8px var(--amber)' : 'none';
  $('band-am').style.color       = currentBand === 'am' ? 'var(--amber)' : 'var(--amber-dim)';
  $('band-am').style.textShadow  = currentBand === 'am' ? '0 0 8px var(--amber)' : 'none';
  $('band-toggle').textContent   = currentBand.toUpperCase();
  $('band-toggle').classList.toggle('on', currentBand === 'am');
  $('unit').textContent          = currentBand === 'am' ? 'kHz' : 'MHz';
}

// ---------------------------------------------------------------------------
// HD UI
// ---------------------------------------------------------------------------
function updateHdUI() {
  const hdActive = currentHd && currentBand === 'fm';

  // HD LED in status row
  const led = $('hd-led');
  led.classList.toggle('hd', hdActive);
  led.classList.toggle('on', false);

  // HD label text (HD1, HD2, …)
  $('hd-label').textContent = hdActive ? `HD${currentSubchannel + 1}` : 'HD';

  // Subchannel badge next to band letters on LCD
  const sub = $('band-hd-sub');
  sub.textContent = hdActive ? `HD${currentSubchannel + 1}` : '';
  sub.style.display = hdActive ? '' : 'none';

  // HD toggle button
  const hdBtn = $('hd-toggle');
  hdBtn.classList.toggle('on', hdActive);
  hdBtn.disabled = currentBand !== 'fm' || !currentFreq;

  // Subchannel row
  $('hd-subch-row').style.display = hdActive ? '' : 'none';

  // Active subchannel button
  document.querySelectorAll('.hd-ch').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.sub) === currentSubchannel);
  });
}

// ---------------------------------------------------------------------------
// Seek
// ---------------------------------------------------------------------------
function seek(direction) {
  const list = (stations[currentBand] || []).slice();
  if (!list.length) {
    showToast(`No ${currentBand.toUpperCase()} stations — run a scan from admin page`);
    return;
  }
  list.sort((a, b) => {
    const fa = currentBand === 'fm' ? a.freq_mhz : a.freq_khz;
    const fb = currentBand === 'fm' ? b.freq_mhz : b.freq_khz;
    return fa - fb;
  });
  let idx = list.findIndex(s => stationFreqStr(s, currentBand) === currentFreq);
  if (idx < 0) idx = direction > 0 ? -1 : list.length;
  idx = (idx + direction + list.length) % list.length;
  // Seeking always lands on analog (HD can be toggled after)
  tuneTo(stationFreqStr(list[idx], currentBand), currentBand, false, 0);
}

// ---------------------------------------------------------------------------
// Playback
//
// `isPlaying` is the user's *intent* to be listening, not whether audio is
// currently flowing. On flaky wifi the browser silently drops the <audio>
// fetch (firing error/stalled/ended) and never retries a live stream on its
// own — so while the user intends to play, we run our own reconnect loop with
// exponential backoff until a 'playing' event confirms we're live again.
// ---------------------------------------------------------------------------
let reconnectTimer = null;
let reconnectDelay = 1000;            // backoff, doubles up to RECONNECT_MAX
const RECONNECT_MIN = 1000;
const RECONNECT_MAX = 10000;

function openStream() {
  // Cache-bust so we get a fresh Icecast connection, not a stale buffered one.
  const sep = STREAM_URL.includes('?') ? '&' : '?';
  audio.src = STREAM_URL + sep + 't=' + Date.now();
  audio.volume = $('vol').value / 100;
  return audio.play();
}

function playStream() {
  if (!STREAM_URL) { showToast('No stream URL configured. Visit admin > Settings.'); return; }
  isPlaying = true;                   // intent: keep this stream alive
  reconnectDelay = RECONNECT_MIN;
  clearTimeout(reconnectTimer); reconnectTimer = null;
  $('play-btn').textContent = '⏸';
  $('stream-led').classList.remove('err');
  $('stream-led').classList.add('on');
  const p = openStream();
  if (p && p.catch) {
    p.catch(() => { if (isPlaying) scheduleReconnect(); });
  }
  startLevels();   // first play is a user gesture → AudioContext resumes cleanly
}

function pauseStream() {
  isPlaying = false;                  // intent: stop — cancels any reconnect
  clearTimeout(reconnectTimer); reconnectTimer = null;
  audio.pause(); audio.src = '';
  $('play-btn').textContent = '▶';
  $('stream-led').classList.remove('on');
  $('stream-led').classList.remove('err');
  stopLevels();
}

function scheduleReconnect() {
  if (!isPlaying || reconnectTimer) return;   // dedupe overlapping drop events
  $('stream-led').classList.remove('on');
  $('stream-led').classList.add('err');
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    if (!isPlaying) return;
    if (navigator.onLine === false) { scheduleReconnect(); return; }  // wait for net
    const p = openStream();
    if (p && p.catch) p.catch(() => { if (isPlaying) scheduleReconnect(); });
    reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX);
  }, reconnectDelay);
}

// ---------------------------------------------------------------------------
// Stream quality (bitrate)
//
// Lower bitrate = less bandwidth = fewer dropouts on weak wifi, at some audio
// quality cost. Changing it rewrites active.env and restarts the FM stream
// server-side, so the audio briefly drops and the player reconnects.
// ---------------------------------------------------------------------------
function renderQuality() {
  document.querySelectorAll('.qual-ch').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.br === currentBitrate));
}

async function setBitrate(br) {
  if (br === currentBitrate) return;
  const wasPlaying = isPlaying;
  showToast('Switching to ' + br + ' — stream will reconnect…');
  if (isPlaying) pauseStream();
  $('stream-led').classList.add('hd');          // amber while the stream restarts
  try {
    const r = await fetch('/api/bitrate', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({bitrate: br}),
    });
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || 'quality change failed');
    currentBitrate = br;
    renderQuality();
    if (wasPlaying) {
      await waitForStream();
      $('stream-led').classList.remove('hd');
      playStream();
    } else {
      $('stream-led').classList.remove('hd');
    }
  } catch (e) {
    $('stream-led').classList.remove('hd');
    showToast('Quality change failed: ' + e.message);
    if (wasPlaying) playStream();                // resume on the old setting
  }
}

// ---------------------------------------------------------------------------
// Direct tune
// ---------------------------------------------------------------------------
function openDirectTune() {
  directTuneBand = currentBand;
  updateDirectTuneUI();
  const inp = $('direct-freq-input');
  if (currentFreq) {
    inp.value = directTuneBand === 'fm' ? Number(currentFreq).toFixed(1) : currentFreq;
  } else {
    inp.value = '';
  }
  $('direct-tune-modal').classList.add('show');
  setTimeout(() => { inp.select(); inp.focus(); }, 60);
}

function updateDirectTuneUI() {
  document.querySelectorAll('[data-dt-band]').forEach(b => {
    b.classList.toggle('primary', b.dataset.dtBand === directTuneBand);
  });
  const inp = $('direct-freq-input');
  if (directTuneBand === 'fm') {
    inp.min = 87.5; inp.max = 108.1; inp.step = 0.1; inp.placeholder = '000.0';
    $('direct-tune-hint').textContent = '87.5 – 108.1 MHz';
  } else {
    inp.min = 530; inp.max = 1710; inp.step = 10; inp.placeholder = '0000';
    $('direct-tune-hint').textContent = '530 – 1710 kHz (nearest 10 kHz)';
  }
}

function commitDirectTune() {
  const val = $('direct-freq-input').value.trim();
  if (!val) { $('direct-tune-modal').classList.remove('show'); return; }
  const num = parseFloat(val);
  if (directTuneBand === 'fm') {
    if (isNaN(num) || num < 87.5 || num > 108.1) {
      showToast('FM: enter 87.5 – 108.1 MHz'); return;
    }
    $('direct-tune-modal').classList.remove('show');
    tuneTo(Number(num.toFixed(1)).toString(), 'fm', false, 0);
  } else {
    const khz = Math.round(num / 10) * 10;
    if (isNaN(num) || khz < 530 || khz > 1710) {
      showToast('AM: enter 530 – 1710 kHz'); return;
    }
    $('direct-tune-modal').classList.remove('show');
    tuneTo(String(khz), 'am', false, 0);
  }
}

// ---------------------------------------------------------------------------
// Station modal
// ---------------------------------------------------------------------------
function openStationsModal(band) {
  modalBand = band || currentBand;
  renderStationsModal();
  $('stations-modal').classList.add('show');
}

function renderStationsModal() {
  $('modal-title').textContent = `${modalBand.toUpperCase()} stations`;
  document.querySelectorAll('[data-modal-band]').forEach(b => {
    b.classList.toggle('primary', b.dataset.modalBand === modalBand);
  });
  const list = (stations[modalBand] || []).slice().sort((a, b) => {
    const fa = modalBand === 'fm' ? a.freq_mhz : a.freq_khz;
    const fb = modalBand === 'fm' ? b.freq_mhz : b.freq_khz;
    return fa - fb;
  });
  const target = $('modal-list');
  target.innerHTML = '';
  if (!list.length) {
    target.innerHTML = `<div class="modal-empty">No stations for ${modalBand.toUpperCase()}.<br>Run a scan from the admin page.</div>`;
    return;
  }
  list.forEach(s => {
    const f = stationFreqStr(s, modalBand);

    // Analog row
    const row = document.createElement('div');
    row.className = 'modal-row';
    row.innerHTML = `
      <div class="left">
        <span class="freq">${formatFreq(f, modalBand)}</span>
        <span class="name">${s.call || s.ps || '—'}</span>
        ${s.city ? `<span class="city">${s.city}${s.state ? ', ' + s.state : ''}</span>` : ''}
      </div>
      <span class="snr">${s.snr_db != null ? s.snr_db + ' dB' : ''}${
        s.antenna ? ` <span class="antbadge" title="best antenna from scan">ANT ${s.antenna.slice(-1)}</span>` : ''}</span>
    `;
    row.addEventListener('click', () => {
      // Auto-select the best antenna found by the all-antenna scan (FM only).
      tuneTo(f, modalBand, false, 0, null, s.antenna || null);   // FM + AM both honor the scan's best antenna
      $('stations-modal').classList.remove('show');
    });
    target.appendChild(row);

    // HD subchannel rows (FM only, when hd_programs is known)
    if (modalBand === 'fm' && s.hd_programs && s.hd_programs.length) {
      s.hd_programs.forEach(prog => {
        const hdRow = document.createElement('div');
        hdRow.className = 'modal-row hd-row';
        const hdName = (s.call || s.ps || '') + ' HD' + (prog + 1);
        hdRow.innerHTML = `
          <div class="left">
            <span class="freq">${formatFreq(f, 'fm', true, prog)}</span>
            <span class="name">${hdName}</span>
            ${s.city ? `<span class="city">${s.city}${s.state ? ', ' + s.state : ''}</span>` : ''}
          </div>
          <span class="hd-badge">HD</span>
        `;
        hdRow.addEventListener('click', () => {
          tuneTo(f, 'fm', true, prog);
          $('stations-modal').classList.remove('show');
        });
        target.appendChild(hdRow);
      });
    }
  });
}

// ---------------------------------------------------------------------------
// Album art (layout C): cover tile + blurred panel wash, both in the LCD.
//
// Preload through our same-origin proxy (the raw mzstatic CDN is often blocked
// or TLS-inspected on remote/corporate wifi even when the site itself loads),
// and ignore a load that completes after a newer track has already arrived.
// ---------------------------------------------------------------------------
function setArtBackground(url) {
  url = url || '';
  if (url === currentArtUrl) return;
  currentArtUrl = url;
  const lcd = $('lcd'), cover = $('lcd-cover'), wash = $('art-wash');
  if (!url) {                                  // no art → hide cover + wash
    lcd.classList.remove('has-art');
    cover.style.backgroundImage = '';
    wash.style.backgroundImage = '';
    return;
  }
  const src = '/api/art?u=' + encodeURIComponent(url);
  const img = new Image();
  img.onload = () => {
    if (currentArtUrl !== url) return;         // superseded by a newer track
    cover.style.backgroundImage = `url("${src}")`;
    wash.style.backgroundImage  = `url("${src}")`;
    lcd.classList.add('has-art');
  };
  img.src = src;                               // onerror: keep previous art
}

// ---------------------------------------------------------------------------
// Now playing poll
// ---------------------------------------------------------------------------
async function pollNowPlaying() {
  try {
    const d = await (await fetch('/api/now_playing')).json();
    if (d.freq && d.band) {
      const bandChanged = d.band !== currentBand;
      const hdChanged = (!!d.hd !== currentHd || (d.subchannel || 0) !== currentSubchannel);
      const changed   = d.freq !== currentFreq || d.band !== currentBand || hdChanged;
      currentFreq       = d.freq;
      currentBand       = d.band;
      currentHd         = !!d.hd;
      currentSubchannel = d.subchannel || 0;
      if (changed) { updateBandUI(); updateHdUI(); renderPresets(); }
      if (bandChanged) { applyVizBandPref(); applyDuckBandPref(); }
    }
    // MONO toggle reflects the selected MODE (d.stereo); the STEREO LED + label
    // + L/R meter reflect TRUE 19 kHz pilot detection (d.pilot) from the decoder.
    if (typeof d.stereo === 'boolean') {
      currentStereo = d.stereo;
      const mb = $('mono-toggle');
      mb.classList.toggle('on', !d.stereo);
      mb.disabled = (currentBand !== 'fm');
    }
    currentPilot = (currentBand === 'fm') && (d.pilot === true);
    $('stereo-led').classList.toggle('on', currentPilot);
    $('stereo-label').textContent = (currentBand === 'fm' && !currentPilot) ? 'MONO' : 'STEREO';
    // Antenna A/B/C cycle reflects server state; FM-only.
    if (d.antenna) {
      currentAntenna = d.antenna;
      const ab = $('ant-toggle');
      const letter = d.antenna.slice(-1);            // 'A' | 'B' | 'C'
      ab.textContent = 'ANT ' + letter;
      ab.classList.toggle('on', letter !== 'A');     // highlight non-default
      ab.disabled = (currentBand !== 'fm' && currentBand !== 'am');  // AM picks an antenna too
    }
    // Frequency display
    if (currentFreq) {
      $('freq-display').innerHTML =
        (currentBand === 'fm' ? Number(currentFreq).toFixed(1) : currentFreq)
        + `<span class="unit">${currentBand === 'am' ? 'kHz' : 'MHz'}</span>`;
    }
    // Station label
    const rds = d.rds || {};
    const fcc = d.fcc;
    let label = '—', city = '';
    if (d.fcc_override && fcc && fcc.call) {       // hand-pinned name wins over RDS/FCC
      label = fcc.call;
      if (fcc.city) city = fcc.city + (fcc.state ? ', ' + fcc.state : '');
    } else if (rds.ps) {
      label = rds.ps;
      if (fcc && fcc.city) city = fcc.city + (fcc.state ? ', ' + fcc.state : '');
    } else if (fcc && fcc.call) {
      label = fcc.call;
      if (fcc.city) city = fcc.city + (fcc.state ? ', ' + fcc.state : '');
    } else if (currentBand === 'am') {
      label = 'AM Broadcast';
    }
    currentStationLabel = (label && label !== '—') ? label : '';
    $('call-display').innerHTML = label
      + (city ? ` <span class="city">· ${city}</span>` : '')
      + (d.fcc_override ? ' <span class="ovr-badge" title="hand-edited name">✎</span>' : '');
    // Track + provenance. Prefer the resolved track (what the ID pipeline and
    // the art/Android client use), falling back to raw RDS text. The badge
    // shows which source identified it.
    const t = d.track;
    let trackText = '', src = '';
    if (t && (t.artist || t.title)) {
      trackText = [t.artist, t.title].filter(Boolean).join(' — ');
      src = t.source || '';
    } else if (rds.artist || rds.title) {
      trackText = [rds.artist, rds.title].filter(Boolean).join(' — ');
      src = 'rds';
    } else if (rds.rt) {
      trackText = rds.rt;
    }
    $('track-display').textContent = trackText;
    const SRC_LABELS = { rds: 'RDS', lyrics: 'LYRICS', acoustid: 'CHROMA' };
    const srcBadge = $('track-src');
    if (trackText && SRC_LABELS[src]) {
      srcBadge.textContent = SRC_LABELS[src];
      srcBadge.className = 'track-src src-' + src;
      srcBadge.style.display = '';
    } else {
      srcBadge.style.display = 'none';
    }
    // Album-art ambient background (from the resolved track, if identified)
    setArtBackground(t && t.art_url);
    // HD state machine
    if (d.hd_unavailable && currentHd) {
      currentHd = false;
      currentSubchannel = 0;
      localStorage.setItem(LS_HD,   '0');
      localStorage.setItem(LS_SUBCH, '0');
      updateHdUI();
      renderPresets();
      showToast('No HD signal — fell back to FM analog');
    } else if (d.hd_probing && currentHd) {
      $('hd-label').textContent = 'HD…';
    } else if (d.hd_locked && currentHd) {
      $('hd-label').textContent = `HD${currentSubchannel + 1}`;
    }
    // LEDs
    $('rds-led').classList.toggle('on', !!(rds.ps || rds.rt));
    // Ticker
    const ticker = $('ticker');
    if (d.mode === 'lyrics' && d.lyrics?.lines?.length) {
      const i = d.lyrics.index;
      const line = (i >= 0 && d.lyrics.lines[i]) ? d.lyrics.lines[i].text : '';
      ticker.className = 'ticker lyric';
      ticker.textContent = line || '♪';
    } else if (d.mode === 'captions' && d.caption?.text) {
      ticker.className = 'ticker';
      ticker.textContent = d.caption.text;
    } else {
      ticker.textContent = '';
    }
  } catch (e) {}
}

async function pollStations() {
  try {
    const d = await (await fetch('/api/stations')).json();
    stations.fm = d.fm || [];
    stations.am = d.am || [];
  } catch (e) {}
}

// ---------------------------------------------------------------------------
// Weather-satellite next-pass notice + listener authorization
// ---------------------------------------------------------------------------
let wxNext = null, wxAuthorizedAos = null, wxDryRun = false, wxTuner = null, wxCapturing = null;

function wxIsAuthorized() {
  return wxNext && wxAuthorizedAos && Math.abs(wxAuthorizedAos - wxNext.aos_unix) <= 120;
}
function fmtCountdown(s) {
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), ss = s % 60;
  return (h > 0 ? h + ':' + String(m).padStart(2, '0') : String(m)) + ':' + String(ss).padStart(2, '0');
}

async function pollWxsat() {
  try {
    const s = await (await fetch('/api/wxsat/status')).json();
    wxNext = s.next_pass; wxAuthorizedAos = s.authorized_aos;
    wxDryRun = !!s.dry_run; wxTuner = s.tuner; wxCapturing = s.capturing_pass;
    renderWxsat();
  } catch (e) {}
}

function renderWxsat() {
  const row = $('wxsat-row'), btn = $('wxsat-btn');
  // A capture is happening right now (stream is paused).
  if (wxTuner === 'capturing' && wxCapturing) {
    row.style.display = ''; row.className = 'wxsat-row capturing';
    btn.style.display = 'none';
    $('wxsat-text').innerHTML =
      `<b>${wxCapturing.satellite} capture in progress</b> — the radio is paused (~${Math.round(wxCapturing.duration_min || 0)} min) and resumes automatically.`;
    return;
  }
  // Otherwise show the next *real* scheduled interruption (none in dry-run).
  if (!wxNext || wxDryRun) { row.style.display = 'none'; return; }
  row.style.display = '';
  row.className = 'wxsat-row ' + (wxIsAuthorized() ? 'authorized' : 'armed');
  btn.style.display = '';
  btn.textContent = wxIsAuthorized() ? 'Cancel' : 'Allow this pass';
  btn.classList.toggle('on', !wxIsAuthorized());
  tickWxsat();
}

function tickWxsat() {
  if (wxTuner === 'capturing' || !wxNext || wxDryRun) return;
  const secs = Math.max(0, wxNext.aos_unix - Math.floor(Date.now() / 1000));
  const when = new Date(wxNext.aos_unix * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const sat = wxNext.satellite, elev = Math.round(wxNext.max_elev || 0), dur = Math.round(wxNext.duration_min || 0);
  $('wxsat-text').innerHTML = wxIsAuthorized()
    ? `✓ <b>${sat}</b> pass authorized — radio pauses at <b>${when}</b> (~${dur} min), in <span class="cd">${fmtCountdown(secs)}</span>`
    : `Next satellite pass: <b>${sat}</b> at ${when} (max ${elev}°), in <span class="cd">${fmtCountdown(secs)}</span>. Radio pauses ~${dur} min for it <b>unless you're listening</b> (then it's skipped).`;
}

async function authorizeWxsat() {
  if (!wxNext) return;
  const cancel = wxIsAuthorized();
  const body = cancel ? { cancel: true } : { aos_unix: wxNext.aos_unix };
  try {
    const r = await (await fetch('/api/wxsat/authorize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    })).json();
    if (r.ok) {
      wxAuthorizedAos = r.authorized_aos;
      renderWxsat();
      showToast(cancel ? 'Pass authorization cancelled' : 'Pass authorized — the radio will pause for the capture');
    } else { showToast('Could not update authorization'); }
  } catch (e) { showToast('Could not update authorization'); }
}

// ---------------------------------------------------------------------------
// Butterchurn visualizer (renders entirely in this browser — zero Pi load).
//
// Audio graph: <audio> → MediaElementSource → destination (always, once the
// graph exists) and → the visualizer. createMediaElementSource() may only be
// called ONCE per element, ever — and once it exists the element plays
// through the graph, so a suspended AudioContext mutes playback. The graph is
// therefore built lazily on a user gesture (the VIZ toggle, or 'playing'
// after a play click), and resume() runs on every 'playing' to self-heal.
// ---------------------------------------------------------------------------
const vizCanvas = $('viz-canvas');
// These UMD bundles export directly or under .default depending on the build.
const bcLib = window.butterchurn
  && (window.butterchurn.default || window.butterchurn);
const bcPresetsLib = window.butterchurnPresets
  && (window.butterchurnPresets.getPresets ? window.butterchurnPresets : window.butterchurnPresets.default);
const bcSupportCheck = window.isSupported
  && (typeof window.isSupported === 'function' ? window.isSupported : window.isSupported.default);

let vizAvailable = false;        // libs loaded + supported — decided once at init
let vizOn = false;
let audioCtx = null;
let mediaSrc = null;             // the once-per-element MediaElementSource guard
let duckGain = null;             // source → duckGain → destination (duck-on-talk)
let visualizer = null;
let vizPresetMap = null, vizPresetKeys = [], vizPresetCurrent = '';
let vizRaf = null, vizPresetTimer = null, vizTapTimer = null;

function vizPrefKey() { return currentBand === 'am' ? LS_VIZ_AM : LS_VIZ_FM; }

// The shared part of the WebAudio graph (used by VIZ and DUCK):
// <audio> → MediaElementSource → duckGain → destination. The viz and the
// duck classifier both tap mediaSrc PRE-gain, so they always see the full
// signal even while the output is ducked. The volume slider stays on the
// element and composes with the gain.
function ensureAudioGraph() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    if (!mediaSrc) {
      mediaSrc = audioCtx.createMediaElementSource(audio);
      duckGain = audioCtx.createGain();
      mediaSrc.connect(duckGain);
      duckGain.connect(audioCtx.destination);   // playback stays wired regardless of features
    }
    return true;
  } catch (e) {
    showToast('Audio features unavailable: ' + e.message);
    return false;
  }
}

// L/R level meters: tap mediaSrc -> ChannelSplitter -> per-channel analysers.
let lvlSplitter = null, lvlAnalyserL = null, lvlAnalyserR = null, levelsRaf = null;
function ensureLevelsMeter() {
  if (!ensureAudioGraph()) return false;
  if (!lvlSplitter) {
    lvlSplitter = audioCtx.createChannelSplitter(2);
    lvlAnalyserL = audioCtx.createAnalyser(); lvlAnalyserL.fftSize = 256;
    lvlAnalyserR = audioCtx.createAnalyser(); lvlAnalyserR.fftSize = 256;
    mediaSrc.connect(lvlSplitter);            // extra tap; playback path unchanged
    lvlSplitter.connect(lvlAnalyserL, 0);
    lvlSplitter.connect(lvlAnalyserR, 1);
  }
  return true;
}
function lvlLevel(buf) {
  // Peak (not RMS) — far livelier movement; RMS sat too low to see.
  let peak = 0;
  for (let i = 0; i < buf.length; i++) { const v = Math.abs(buf[i] - 128); if (v > peak) peak = v; }
  return peak / 128;   // 0..1, ~1 at full scale
}
function setLvlFill(id, level) {
  const fill = document.querySelector('#' + id + ' .lvl-fill');
  if (fill) fill.style.height = Math.min(100, level * 140).toFixed(0) + '%';
}
function startLevels() {
  if (!ensureLevelsMeter() || levelsRaf) return;
  const bufL = new Uint8Array(lvlAnalyserL.fftSize), bufR = new Uint8Array(lvlAnalyserR.fftSize);
  const loop = () => {
    levelsRaf = requestAnimationFrame(loop);
    const stereo = currentPilot;   // true 19 kHz pilot lock (FM-gated server-side)
    $('levels').classList.toggle('mono', !stereo);
    lvlAnalyserL.getByteTimeDomainData(bufL);
    setLvlFill('lvl-l', lvlLevel(bufL));
    if (stereo) { lvlAnalyserR.getByteTimeDomainData(bufR); setLvlFill('lvl-r', lvlLevel(bufR)); }
  };
  loop();
}
function stopLevels() {
  if (levelsRaf) { cancelAnimationFrame(levelsRaf); levelsRaf = null; }
  setLvlFill('lvl-l', 0); setLvlFill('lvl-r', 0);
}

function ensureVizGraph() {
  try {
    if (!ensureAudioGraph()) return false;
    if (!visualizer) {
      visualizer = bcLib.createVisualizer(audioCtx, vizCanvas, {
        width: window.innerWidth,
        height: window.innerHeight,
        pixelRatio: Math.min(window.devicePixelRatio || 1, 2),
      });
      visualizer.connectAudio(mediaSrc);
      vizPresetMap = bcPresetsLib.getPresets();
      vizPresetKeys = Object.keys(vizPresetMap);
      loadRandomVizPreset(0);
      resizeViz();
    }
    return true;
  } catch (e) {
    // Playback survives: if the source node was created it's already wired to
    // destination. Just retire the feature for this session.
    vizAvailable = false;
    vizOn = false;
    vizCanvas.style.display = 'none';
    document.body.classList.remove('viz-on');
    $('viz-toggle').style.display = 'none';
    updateVizRunState();
    showToast('Visualizer unavailable: ' + e.message);
    return false;
  }
}

function loadRandomVizPreset(blendSec) {
  if (!visualizer || !vizPresetKeys.length) return;
  let key = vizPresetKeys[Math.floor(Math.random() * vizPresetKeys.length)];
  if (vizPresetKeys.length > 1 && key === vizPresetCurrent) {
    key = vizPresetKeys[(vizPresetKeys.indexOf(key) + 1) % vizPresetKeys.length];
  }
  vizPresetCurrent = key;
  visualizer.loadPreset(vizPresetMap[key], blendSec);
}

function resizeViz() {
  if (visualizer) visualizer.setRendererSize(window.innerWidth, window.innerHeight);
}

// Render only while there's something to show: VIZ on, tab visible, audio
// playing. Everything else cancels the rAF loop and the preset rotation.
function updateVizRunState() {
  const run = vizOn && visualizer && !document.hidden && !audio.paused;
  if (run && !vizRaf) {
    const tick = () => { vizRaf = requestAnimationFrame(tick); visualizer.render(); };
    vizRaf = requestAnimationFrame(tick);
  } else if (!run && vizRaf) {
    cancelAnimationFrame(vizRaf);
    vizRaf = null;
  }
  if (run && !vizPresetTimer) {
    vizPresetTimer = setInterval(() => loadRandomVizPreset(2.7), 30000);
  } else if (!run && vizPresetTimer) {
    clearInterval(vizPresetTimer);
    vizPresetTimer = null;
  }
}

// Pure state flip — graph creation happens at the call sites that hold a user
// gesture (the toggle handler) or a live stream (the 'playing' handler).
function setViz(on, persist = true) {
  if (!vizAvailable) return;
  vizOn = on;
  vizCanvas.style.display = on ? 'block' : 'none';
  document.body.classList.toggle('viz-on', on);
  $('viz-toggle').classList.toggle('on', on);
  if (persist) localStorage.setItem(vizPrefKey(), on ? '1' : '0');
  updateVizRunState();
}

// Per-band preference: AM defaults off (mono talk is a boring input) but an
// explicit AM enable sticks, independent of the FM choice.
function applyVizBandPref() {
  if (!vizAvailable) return;
  setViz(localStorage.getItem(vizPrefKey()) === '1', false);
}

function toggleVizFullscreen() {
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document);
  } else {
    const req = vizCanvas.requestFullscreen || vizCanvas.webkitRequestFullscreen;
    if (!req) return;                  // e.g. iOS Safari — no canvas fullscreen
    const p = req.call(vizCanvas);
    if (p && p.catch) p.catch(() => {});
  }
}

$('viz-toggle').addEventListener('click', () => {
  if (!vizOn && !visualizer && !ensureVizGraph()) return;
  setViz(!vizOn);
});

// Apply a setting that restarts the source, keeping audio alive across the gap:
// pause, POST, then wait out the reconnect and resume (like tuneTo).
async function applyWithResume(btn, doPost) {
  btn.disabled = true;
  const wasPlaying = isPlaying;
  if (isPlaying) pauseStream();
  $('stream-led').classList.add('hd');
  try { await doPost(); } catch (e) {}
  $('stream-led').classList.remove('hd');
  if (wasPlaying) { isPlaying = true; await waitForStream(); playStream(); }
  btn.disabled = false;
}

// MONO toggle: POST /api/stereo (restarts the stream).
$('mono-toggle').addEventListener('click', () => {
  const mb = $('mono-toggle');
  const goMono = !mb.classList.contains('on');   // turning mono ON -> stereo:false
  applyWithResume(mb, async () => {
    const r = await fetch('/api/stereo', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({stereo: !goMono}),
    });
    if (r.ok) mb.classList.toggle('on', goMono);
  });
});

// Antenna cycle A->B->C->A: POST /api/antenna (restarts the stream).
$('ant-toggle').addEventListener('click', () => {
  const ab = $('ant-toggle');
  const cur = (ab.textContent.trim().slice(-1) || 'A');     // 'A'|'B'|'C'
  const nextLetter = {A: 'B', B: 'C', C: 'A'}[cur] || 'A';
  applyWithResume(ab, async () => {
    const r = await fetch('/api/antenna', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({antenna: 'Antenna ' + nextLetter}),
    });
    if (r.ok) { ab.textContent = 'ANT ' + nextLetter; ab.classList.toggle('on', nextLetter !== 'A'); }
  });
});

// Edit station ID: tap the station name to pin a corrected name (RDS/FCC are often
// wrong). Writes an override that wins over RDS/FCC in the display. No restart.
async function editStationId() {
  if (!currentFreq || (currentBand !== 'fm' && currentBand !== 'am')) return;
  const name = prompt(
    `Station name for ${formatFreq(currentFreq, currentBand)} (blank = use RDS/database):`,
    currentStationLabel || '');
  if (name === null) return;
  try {
    const r = await fetch('/api/station-override', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({band: currentBand, freq: currentFreq, name: name.trim()}),
    });
    const j = await r.json();
    if (j.ok) {
      // Propagate the new name to any preset on this freq/band so its title updates.
      if (name.trim()) {
        let changed = false;
        presets.forEach(p => {
          if (p && p.band === currentBand && String(p.freq) === String(currentFreq)) {
            p.label = name.trim(); changed = true;
          }
        });
        if (changed) { savePresets(); renderPresets(); }
      }
      showToast(name.trim() ? `Saved name: ${name.trim()}` : 'Cleared override');
      pollNowPlaying();
    } else showToast('Edit failed: ' + (j.error || ''));
  } catch (e) { showToast('Edit failed'); }
}
$('call-display').addEventListener('click', editStationId);
audio.addEventListener('playing', () => {
  if (vizOn && !visualizer) ensureVizGraph();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  updateVizRunState();
});
audio.addEventListener('pause', updateVizRunState);
document.addEventListener('visibilitychange', updateVizRunState);
window.addEventListener('resize', resizeViz);
document.addEventListener('fullscreenchange', resizeViz);

// Single tap on the visualizer (the canvas itself, or the empty page
// background around the stereo) toggles fullscreen; double-tap/double-click
// jumps to the next preset. The 300 ms timer disambiguates the two.
document.addEventListener('click', e => {
  if (!vizOn) return;
  if (e.target !== vizCanvas && e.target !== document.body && e.target !== document.documentElement) return;
  if (vizTapTimer) {
    clearTimeout(vizTapTimer);
    vizTapTimer = null;
    loadRandomVizPreset(0);
  } else {
    vizTapTimer = setTimeout(() => { vizTapTimer = null; toggleVizFullscreen(); }, 300);
  }
});

// ---------------------------------------------------------------------------
// Duck on talk (web port of the Android app's TalkMusicClassifier): near-mute
// commercials/DJ talk, prompt restore when music returns. Classifier reads an
// AnalyserNode tapped pre-gain at ~20 Hz; three features that survive FM
// broadcast compression: bass-beat autocorrelation, sustained high-frequency
// content, speech-band envelope burstiness. Asymmetric hysteresis: ~5 s of
// talk before ducking (song outros must not duck), ~1.5 s of music to
// restore. Per-band persistence; AM defaults off (ball games are talk you
// WANT). Score readout lives in the button tooltip.
// ---------------------------------------------------------------------------
const DUCK_VOLUME = 0.07, DUCK_RAMP_S = 1.2, UNDUCK_RAMP_S = 0.25;
const DUCK_MUSIC_TH = 0.55, DUCK_TALK_TH = 0.35;   // talk threshold low: quiet
                                  // song verses (sparse mixes) must not duck
const DUCK_MUSIC_HOLD_MS = 1500, DUCK_TALK_HOLD_MS = 8000;
const DUCK_W_BEAT = 0.50, DUCK_W_HF = 0.30, DUCK_W_STEADY = 0.20;
const DUCK_HF_FULL = 0.12, DUCK_CV_FULL = 0.60;
const DUCK_FRAMES = 160;          // ~8 s of history at 20 Hz (duck decision)
const DUCK_SHORT_FRAMES = 60;     // ~3 s (recovery decision — while ducked the
                                  // long window is full of stale talk frames;
                                  // scoring just the recent slice makes
                                  // music-resume prompt instead of ~30 s)
const DUCK_MIN_FRAMES = 80;       // ~4 s before the first verdict

let duckOn = false;
let duckAnalyser = null, duckBins = null, duckLut = null, duckTimer = null;
let duckBandIdx = null;           // [bassLo,bassHi, midLo,midHi, highLo,highHi]
let duckBass = [], duckMid = [], duckHigh = [];
let duckTickCount = 0, duckState = 'music', duckScore = 0;
let duckMusicRun = 0, duckTalkRun = 0, duckLastEval = 0;

function duckPrefKey() { return currentBand === 'am' ? LS_DUCK_AM : LS_DUCK_FM; }

function ensureDuckTap() {
  if (!ensureAudioGraph()) return false;
  if (!duckAnalyser) {
    duckAnalyser = audioCtx.createAnalyser();
    duckAnalyser.fftSize = 2048;
    duckAnalyser.smoothingTimeConstant = 0;
    mediaSrc.connect(duckAnalyser);            // pre-gain: full signal always
    duckBins = new Uint8Array(duckAnalyser.frequencyBinCount);
    // Byte values are dB-mapped; linearize once so band sums behave like energy.
    duckLut = new Float32Array(256);
    const dbMin = duckAnalyser.minDecibels, dbMax = duckAnalyser.maxDecibels;
    for (let i = 1; i < 256; i++) {
      duckLut[i] = Math.pow(10, (dbMin + (i / 255) * (dbMax - dbMin)) / 20);
    }
    const binHz = audioCtx.sampleRate / duckAnalyser.fftSize;
    duckBandIdx = [
      Math.max(1, Math.round(43 / binHz)),  Math.round(200 / binHz),    // bass
      Math.round(300 / binHz),              Math.round(3400 / binHz),   // speech
      Math.round(4000 / binHz),             Math.round(10800 / binHz),  // high
    ];
  }
  return true;
}

function duckResetState() {
  duckBass = []; duckMid = []; duckHigh = [];
  duckTickCount = 0; duckState = 'music'; duckScore = 0;
  duckMusicRun = 0; duckTalkRun = 0; duckLastEval = 0;
}

function duckButtonUI() {
  const btn = $('duck-toggle');
  btn.classList.toggle('on', duckOn);
  btn.textContent = (duckOn && duckState === 'talk') ? 'DUCKED' : 'DUCK';
  btn.title = duckOn
    ? `Duck on talk — ${duckState} · score ${duckScore.toFixed(2)}`
    : 'Duck on talk — near-mute commercials/DJ talk, prompt restore on music';
}

function duckApplyGain() {
  if (!duckGain) return;
  const target = (duckOn && duckState === 'talk') ? DUCK_VOLUME : 1;
  const t = audioCtx.currentTime;
  const g = duckGain.gain;
  g.cancelScheduledValues(t);
  g.setValueAtTime(g.value, t);
  g.linearRampToValueAtTime(target, t + (target < 1 ? DUCK_RAMP_S : UNDUCK_RAMP_S));
}

function duckTick() {
  if (!duckOn || !duckAnalyser || audio.paused) return;
  duckAnalyser.getByteFrequencyData(duckBins);
  let b = 0, m = 0, h = 0;
  const [bL, bH, mL, mH, hL, hH] = duckBandIdx;
  for (let i = bL; i <= bH; i++) b += duckLut[duckBins[i]];
  for (let i = mL; i <= mH; i++) m += duckLut[duckBins[i]];
  for (let i = hL; i <= hH; i++) h += duckLut[duckBins[i]];
  duckBass.push(b); duckMid.push(m); duckHigh.push(h);
  if (duckBass.length > DUCK_FRAMES) { duckBass.shift(); duckMid.shift(); duckHigh.shift(); }
  if (++duckTickCount % 8 === 0 && duckBass.length >= DUCK_MIN_FRAMES) duckEvaluate();
}

function duckScoreWindow(start) {
  const n = duckBass.length - start;

  // Beat: normalized autocorrelation peak of the bass envelope, 0.25–0.8 s lags.
  let meanBass = 0;
  for (let i = start; i < duckBass.length; i++) meanBass += duckBass[i];
  meanBass /= n;
  let r0 = 1e-9;
  for (let i = start; i < duckBass.length; i++) { const x = duckBass[i] - meanBass; r0 += x * x; }
  let beat = 0;
  for (let lag = 5; lag <= Math.min(16, n - 8); lag++) {
    let r = 0;
    for (let i = start; i < duckBass.length - lag; i++) {
      r += (duckBass[i] - meanBass) * (duckBass[i + lag] - meanBass);
    }
    beat = Math.max(beat, r / r0);
  }
  beat = Math.min(1, Math.max(0, beat));

  // Sustained HF content.
  let hfRatio = 0;
  for (let i = start; i < duckBass.length; i++) {
    const t = duckBass[i] + duckMid[i] + duckHigh[i];
    if (t > 1e-9) hfRatio += duckHigh[i] / t;
  }
  hfRatio /= n;
  const hfScore = Math.min(1, hfRatio / DUCK_HF_FULL);

  // Speech-band envelope steadiness (speech is bursty at syllable rate).
  let meanMid = 0;
  for (let i = start; i < duckMid.length; i++) meanMid += duckMid[i];
  meanMid /= n;
  let varMid = 0;
  for (let i = start; i < duckMid.length; i++) { const d = duckMid[i] - meanMid; varMid += d * d; }
  const cv = meanMid > 1e-9 ? Math.sqrt(varMid / n) / meanMid : 1;
  const steady = Math.min(1, Math.max(0, 1 - cv / DUCK_CV_FULL));

  return Math.min(1, Math.max(0, DUCK_W_BEAT * beat + DUCK_W_HF * hfScore + DUCK_W_STEADY * steady));
}

function duckEvaluate() {
  // Long window decides ducking; short (recent) window decides recovery, so
  // music-resume isn't dragged down by stale talk frames in the history.
  duckScore = duckScoreWindow(0);
  const shortScore = duckState === 'talk'
    ? duckScoreWindow(Math.max(0, duckBass.length - DUCK_SHORT_FRAMES))
    : duckScore;

  // Hysteresis: slow into the duck, prompt out of it.
  const now = Date.now();
  const dt = duckLastEval ? Math.min(2000, now - duckLastEval) : 0;
  duckLastEval = now;
  duckMusicRun = shortScore >= DUCK_MUSIC_TH ? duckMusicRun + dt : 0;
  duckTalkRun  = duckScore <= DUCK_TALK_TH   ? duckTalkRun + dt  : 0;
  const prev = duckState;
  if (duckState === 'talk'  && duckMusicRun >= DUCK_MUSIC_HOLD_MS) duckState = 'music';
  if (duckState === 'music' && duckTalkRun  >= DUCK_TALK_HOLD_MS)  duckState = 'talk';
  if (duckState !== prev) duckApplyGain();
  duckButtonUI();
}

function updateDuckRunState() {
  const run = duckOn && duckAnalyser && !audio.paused;
  if (run && !duckTimer) duckTimer = setInterval(duckTick, 50);
  else if (!run && duckTimer) { clearInterval(duckTimer); duckTimer = null; }
}

// Pure state flip — the tap is built at call sites that hold a user gesture
// (the toggle) or a live stream (the 'playing' handler), same as VIZ.
function setDuck(on, persist = true) {
  duckOn = on;
  if (persist) localStorage.setItem(duckPrefKey(), on ? '1' : '0');
  duckResetState();
  duckApplyGain();                 // restores gain to 1 on disable
  duckButtonUI();
  updateDuckRunState();
}

function applyDuckBandPref() {
  setDuck(localStorage.getItem(duckPrefKey()) === '1', false);
}

$('duck-toggle').addEventListener('click', () => {
  if (!duckOn && !duckAnalyser && !ensureDuckTap()) return;
  setDuck(!duckOn);
});
audio.addEventListener('playing', () => {
  if (duckOn && !duckAnalyser) ensureDuckTap();
  updateDuckRunState();
});
audio.addEventListener('pause', updateDuckRunState);

// ---------------------------------------------------------------------------
// Toast
// ---------------------------------------------------------------------------
let toastTimer;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ---------------------------------------------------------------------------
// Event handlers
// ---------------------------------------------------------------------------
$('play-btn').addEventListener('click', () => {
  if (isPlaying) pauseStream(); else playStream();
});

// Auto-reconnect: the browser drops a live <audio> stream on a network blip
// and won't retry it. While the user intends to play, re-open on every drop
// signal, and recover instantly when the network or tab visibility returns.
//
// error/ended = the stream is definitely dead → reconnect now. stalled/waiting
// = data stopped arriving but the browser is still trying → give it a grace
// period (a real flaky-wifi stall won't recover; a momentary one will) before
// re-opening, so normal buffering hiccups don't cause needless audio gaps.
let stallTimer = null;
let stallPos = 0;
function armStallWatchdog() {
  if (!isPlaying || stallTimer) return;
  stallPos = audio.currentTime;
  stallTimer = setTimeout(() => {
    stallTimer = null;
    if (!isPlaying) return;
    // A live stall freezes currentTime without pausing the element; if the
    // position didn't advance over the grace window, the stream is dead.
    if (audio.paused || audio.currentTime === stallPos) scheduleReconnect();
    // else: playback resumed on its own — future stalls will re-arm us.
  }, 4000);
}
function clearStallWatchdog() { clearTimeout(stallTimer); stallTimer = null; }

['error', 'ended'].forEach(ev =>
  audio.addEventListener(ev, () => { if (isPlaying) scheduleReconnect(); }));
['stalled', 'waiting'].forEach(ev =>
  audio.addEventListener(ev, () => { if (isPlaying) armStallWatchdog(); }));
audio.addEventListener('playing', () => {
  reconnectDelay = RECONNECT_MIN;             // healthy again — reset backoff
  clearStallWatchdog();
  $('stream-led').classList.remove('err');
  if (isPlaying) $('stream-led').classList.add('on');
});
window.addEventListener('online', () => {
  if (!isPlaying) return;
  clearTimeout(reconnectTimer); reconnectTimer = null;
  reconnectDelay = RECONNECT_MIN;
  scheduleReconnect();
});
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && isPlaying && (audio.paused || audio.error)) scheduleReconnect();
});
$('vol').addEventListener('input', e => {
  audio.volume = e.target.value / 100;
  localStorage.setItem(LS_VOL, e.target.value);
  $('vol-icon').textContent = e.target.value == 0 ? '🔇'
                            : e.target.value < 33 ? '🔈'
                            : e.target.value < 66 ? '🔉' : '🔊';
});
$('band-toggle').addEventListener('click', () => {
  const newBand = currentBand === 'fm' ? 'am' : 'fm';
  const list = (stations[newBand] || []).slice();
  if (list.length) {
    list.sort((a, b) => (b.snr_db || 0) - (a.snr_db || 0));
    tuneTo(stationFreqStr(list[0], newBand), newBand, false, 0);
  } else {
    showToast(`No ${newBand.toUpperCase()} stations scanned yet`);
  }
});
$('hd-toggle').addEventListener('click', () => {
  if (currentBand !== 'fm') { showToast('HD Radio is FM-only'); return; }
  if (!currentFreq) { showToast('Tune to an FM station first'); return; }
  tuneTo(currentFreq, 'fm', !currentHd, currentHd ? 0 : currentSubchannel);
});
document.querySelectorAll('.hd-ch').forEach(btn => {
  btn.addEventListener('click', () => {
    if (!currentHd || !currentFreq || currentBand !== 'fm') return;
    const sub = parseInt(btn.dataset.sub);
    if (sub !== currentSubchannel) tuneTo(currentFreq, 'fm', true, sub);
  });
});
document.querySelectorAll('.qual-ch').forEach(btn => {
  btn.addEventListener('click', () => setBitrate(btn.dataset.br));
});
$('seek-up').addEventListener('click',   () => seek(+1));
$('seek-down').addEventListener('click', () => seek(-1));
$('freq-display').addEventListener('click', openDirectTune);
$('direct-tune-btn').addEventListener('click', openDirectTune);
$('direct-tune-go').addEventListener('click', commitDirectTune);
$('direct-tune-cancel').addEventListener('click', () => $('direct-tune-modal').classList.remove('show'));
$('direct-freq-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') commitDirectTune();
  if (e.key === 'Escape') $('direct-tune-modal').classList.remove('show');
});
$('direct-tune-modal').addEventListener('click', e => {
  if (e.target.id === 'direct-tune-modal') $('direct-tune-modal').classList.remove('show');
});
document.querySelectorAll('[data-dt-band]').forEach(b => {
  b.addEventListener('click', () => { directTuneBand = b.dataset.dtBand; updateDirectTuneUI(); });
});
$('stations-btn').addEventListener('click', () => openStationsModal(currentBand));
$('modal-close').addEventListener('click', () => $('stations-modal').classList.remove('show'));
document.querySelectorAll('[data-modal-band]').forEach(b => {
  b.addEventListener('click', () => { modalBand = b.dataset.modalBand; renderStationsModal(); });
});
$('stations-modal').addEventListener('click', e => {
  if (e.target.id === 'stations-modal') $('stations-modal').classList.remove('show');
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
const savedVol = localStorage.getItem(LS_VOL);
if (savedVol != null) {
  $('vol').value = savedVol;
  $('vol').dispatchEvent(new Event('input'));
}

updateBandUI();
updateHdUI();
renderPresets();
renderQuality();
// Reflect the server's current stream bitrate in the quality selector.
fetch('/api/status').then(r => r.json()).then(d => {
  if (d.bitrate) { currentBitrate = d.bitrate; renderQuality(); }
}).catch(() => {});
// Visualizer feature-gate: vendored libs present, butterchurn's own support
// check, and a WebGL2 probe. Unsupported → the VIZ button never appears.
try {
  vizAvailable = !!(bcLib && bcPresetsLib
    && (typeof bcSupportCheck === 'function' ? bcSupportCheck() : false)
    && document.createElement('canvas').getContext('webgl2'));
} catch (e) { vizAvailable = false; }
if (vizAvailable) {
  $('viz-toggle').style.display = '';
  applyVizBandPref();
}
applyDuckBandPref();   // visual state only — the tap builds on play/toggle
$('wxsat-btn').addEventListener('click', authorizeWxsat);
pollStations();
pollNowPlaying();
pollWxsat();
setInterval(pollNowPlaying, 1000);
setInterval(pollStations, 30000);
setInterval(pollWxsat, 15000);   // next-pass status / authorization
setInterval(tickWxsat, 1000);    // live countdown
</script>
</body>
